<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Validador de CPF</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      width: 200px;
      text-align: center;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #22c55e;
      color: black;
    }
    #resultado {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>Validador de CPF</h1>
  <input type="text" id="cpf" placeholder="Digite o CPF">
  <br>
  <button onclick="validarCPF()">Validar</button>

  <div id="resultado">---</div>

  <script>
    function validarCPF() {
      let cpf = document.getElementById("cpf").value.replace(/\D/g, '');

      if (cpf.length !== 11) {
        mostrar("❌ CPF inválido");
        return;
      }

      // evita CPFs iguais tipo 11111111111
      if (/^(\d)\1+$/.test(cpf)) {
        mostrar("❌ CPF inválido");
        return;
      }

      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf[i]) * (10 - i);
      }

      let d1 = 11 - (soma % 11);
      if (d1 >= 10) d1 = 0;

      if (d1 != cpf[9]) {
        mostrar("❌ CPF inválido");
        return;
      }

      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf[i]) * (11 - i);
      }

      let d2 = 11 - (soma % 11);
      if (d2 >= 10) d2 = 0;

      if (d2 != cpf[10]) {
        mostrar("❌ CPF inválido");
        return;
      }

      mostrar("✅ CPF válido");
    }

    function mostrar(msg) {
      document.getElementById("resultado").innerText = msg;
    }
  </script>

</body>
</html>
